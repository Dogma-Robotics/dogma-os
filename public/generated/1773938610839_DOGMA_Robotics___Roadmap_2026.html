<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>DOGMA Robotics - Roadmap 2026</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#fff;color:#1a1a2e;padding:40px 60px;max-width:900px;margin:auto;line-height:1.6}
  h1{color:#C8A74B;border-bottom:3px solid #C8A74B;padding-bottom:8px;margin-bottom:20px;font-size:28px}

  pre{background:#0A0A18;color:#C8C4BC;padding:16px;border-radius:6px;overflow-x:auto;margin:12px 0}
